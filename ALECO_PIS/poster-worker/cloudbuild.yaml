# Cloud Build configuration for deploying poster-worker to Cloud Run
# Usage: gcloud builds submit --config cloudbuild.yaml .

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/poster-worker:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/poster-worker:latest', '.']
  
  # Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/poster-worker:$COMMIT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/poster-worker:latest']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'poster-worker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/poster-worker:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'asia-southeast1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--cpu'
      - '1'
      - '--memory'
      - '1Gi'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--timeout'
      - '180'
      - '--set-env-vars'
      - 'CLOUDINARY_CLOUD_NAME=$$CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY=$$CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET=$$CLOUDINARY_API_SECRET,PUBLIC_APP_URL_PRODUCTION=$$PUBLIC_APP_URL_PRODUCTION,POSTER_WORKER_API_KEY=$$POSTER_WORKER_API_KEY'
    secretEnv: ['CLOUDINARY_CLOUD_NAME', 'CLOUDINARY_API_KEY', 'CLOUDINARY_API_SECRET', 'PUBLIC_APP_URL_PRODUCTION', 'POSTER_WORKER_API_KEY']

# Store images
images:
  - 'gcr.io/$PROJECT_ID/poster-worker:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/poster-worker:latest'

# Define secrets
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/CLOUDINARY_CLOUD_NAME/versions/latest
      env: CLOUDINARY_CLOUD_NAME
    - versionName: projects/$PROJECT_ID/secrets/CLOUDINARY_API_KEY/versions/latest
      env: CLOUDINARY_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/CLOUDINARY_API_SECRET/versions/latest
      env: CLOUDINARY_API_SECRET
    - versionName: projects/$PROJECT_ID/secrets/PUBLIC_APP_URL_PRODUCTION/versions/latest
      env: PUBLIC_APP_URL_PRODUCTION
    - versionName: projects/$PROJECT_ID/secrets/POSTER_WORKER_API_KEY/versions/latest
      env: POSTER_WORKER_API_KEY
